<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect width="860" height="520" rx="14" fill="#0d1117"/>
  <text x="430" y="40" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">ThinkPad Fan Control — architecture</text>

  <!-- GUI -->
  <rect x="300" y="70" width="260" height="90" rx="10" fill="#161b22" stroke="#e05a4d" stroke-width="1.5"/>
  <text x="430" y="100" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">GUI (PyQt6)</text>
  <text x="430" y="126" text-anchor="middle" fill="#8b949e" font-size="12.5">Fan · Sensors · Battery · Power</text>
  <text x="430" y="146" text-anchor="middle" fill="#8b949e" font-size="12.5">manual · curve · target thermostat</text>

  <!-- Read arrows -->
  <line x1="360" y1="160" x2="180" y2="230" stroke="#3fb950" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="238" y="196" fill="#3fb950" font-size="11" transform="rotate(-19 238 196)">read</text>

  <!-- Write arrows -->
  <line x1="500" y1="160" x2="500" y2="228" stroke="#e05a4d" stroke-width="1.6" marker-end="url(#r)"/>
  <text x="512" y="200" fill="#e05a4d" font-size="11">write (sudo)</text>

  <!-- Config -->
  <line x1="430" y1="70" x2="430" y2="40" stroke="#8b949e" stroke-width="0"/>

  <!-- SYSFS read box -->
  <rect x="40" y="230" width="270" height="150" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="175" y="258" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Kernel sysfs (read)</text>
  <text x="60" y="284" fill="#8b949e" font-size="12.5">/sys/class/hwmon — temps, fan RPM</text>
  <text x="60" y="306" fill="#8b949e" font-size="12.5">/sys/class/powercap — RAPL PL1/PL2</text>
  <text x="60" y="328" fill="#8b949e" font-size="12.5">/sys/firmware/acpi/platform_profile</text>
  <text x="60" y="350" fill="#8b949e" font-size="12.5">/sys/class/power_supply/BAT0</text>
  <text x="60" y="372" fill="#8b949e" font-size="12.5">/sys/.../intel-rapl energy_uj (power draw)</text>

  <!-- fanctl helper -->
  <rect x="380" y="230" width="240" height="86" rx="10" fill="#161b22" stroke="#e05a4d" stroke-width="1.3"/>
  <text x="500" y="258" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">fanctl (NOPASSWD sudo)</text>
  <text x="500" y="282" text-anchor="middle" fill="#8b949e" font-size="12">validates every arg, then writes:</text>
  <text x="500" y="301" text-anchor="middle" fill="#8b949e" font-size="12">fan level · PL1/PL2 · charge %</text>

  <!-- write targets -->
  <rect x="380" y="356" width="240" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="500" y="382" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="700">Privileged writes</text>
  <text x="400" y="406" fill="#8b949e" font-size="12.5">/proc/acpi/ibm/fan  (level)</text>
  <text x="400" y="428" fill="#8b949e" font-size="12.5">powercap constraint_*_power_uw</text>
  <text x="400" y="450" fill="#8b949e" font-size="12.5">BAT0 charge_control_*_threshold</text>
  <line x1="500" y1="316" x2="500" y2="354" stroke="#e05a4d" stroke-width="1.6" marker-end="url(#r)"/>

  <!-- kernel gate note -->
  <rect x="380" y="70" width="180" height="0" fill="none"/>
  <rect x="600" y="356" width="220" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="710" y="382" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="700">Enabling gate</text>
  <text x="620" y="408" fill="#8b949e" font-size="12">thinkpad_acpi fan_control=1</text>
  <text x="620" y="428" fill="#8b949e" font-size="12">(modprobe.d, set by setup)</text>
  <text x="620" y="452" fill="#8b949e" font-size="12">CRITICAL_TEMP → full-speed</text>

  <!-- optional telemetry -->
  <rect x="600" y="230" width="220" height="86" rx="10" fill="#161b22" stroke="#30363d" stroke-dasharray="5 4"/>
  <text x="710" y="258" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="700">Optional telemetry</text>
  <text x="710" y="282" text-anchor="middle" fill="#8b949e" font-size="12">Prometheus / VictoriaMetrics</text>
  <text x="710" y="301" text-anchor="middle" fill="#8b949e" font-size="12">ntfy critical alerts · off by default</text>
  <line x1="560" y1="120" x2="700" y2="228" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#gr)"/>

  <!-- config -->
  <rect x="40" y="70" width="230" height="86" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="155" y="98" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="700">~/.config/fan-control</text>
  <text x="155" y="122" text-anchor="middle" fill="#8b949e" font-size="12">config.json — curves, presets,</text>
  <text x="155" y="141" text-anchor="middle" fill="#8b949e" font-size="12">PL limits, telemetry</text>
  <line x1="270" y1="113" x2="298" y2="113" stroke="#8b949e" stroke-width="1.4" marker-end="url(#gr)"/>

  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3fb950"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e05a4d"/></marker>
    <marker id="gr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8b949e"/></marker>
  </defs>
</svg>
